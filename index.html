<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>David's AR ID Card</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>
    <script>
      AFRAME.registerComponent('fix-canvas', {
        init: function() {
          const originalGetContext = HTMLCanvasElement.prototype.getContext;
          HTMLCanvasElement.prototype.getContext = function(type, attributes) {
            if (type === '2d') {
              attributes = attributes || {};
              attributes.willReadFrequently = true;
            }
            return originalGetContext.call(this, type, attributes);
          };
        }
      });

      AFRAME.registerComponent('marker-debug', {
        init: function() {
          this.el.addEventListener('markerFound', function() {
            console.log('MARKER FOUND!');
            document.getElementById('status').innerText = 'Marker Found!';
            document.getElementById('status').style.color = 'lime';
          });
          this.el.addEventListener('markerLost', function() {
            console.log('MARKER LOST!');
            document.getElementById('status').innerText = 'Marker Lost - Keep searching...';
            document.getElementById('status').style.color = 'red';
          });
        }
      });
    </script>
  </head>

  <body style="margin: 0; overflow: hidden; touch-action: none;">
    <div id="status" style="position: absolute; top: 10px; left: 10px; z-index: 999; color: yellow; font-size: 16px; font-weight: bold; background: rgba(0,0,0,0.7); padding: 8px; border-radius: 5px;">
      Looking for marker...
    </div>
    <a-scene 
      fix-canvas
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false; sourceWidth: 1280; sourceHeight: 960; displayWidth: 1280; displayHeight: 960;"
      vr-mode-ui="enabled: false"
      renderer="logarithmicDepthBuffer: true; precision: medium; antialias: true;"
      cursor="rayOrigin: mouse"
      raycaster="objects: .clickable">

      <a-marker type="pattern" url="./myid.patt" marker-debug>
        
        <a-entity id="dashboard" position="0 0 0" rotation="-90 0 0" scale="0.8 0.8 0.8">
          
          <a-plane width="2.2" height="1.4" color="#1a1a1a" opacity="0.9"></a-plane>

          <a-text value="DAVID JOEMON" color="#00ffcc" align="center" position="0 0.45 0.01" width="4"></a-text>
          <a-text value="Full-Stack Product Engineer" color="#ffffff" align="center" position="0 0.3 0.01" width="2.5"></a-text>

          <a-box 
            class="clickable"
            position="-0.5 -0.2 0.1" 
            width="0.8" height="0.3" depth="0.1" 
            color="#3498db"
            onclick="window.open('https://davidajoemon.vercel.app/', '_blank')"
            animation__hover="property: material.color; from: #3498db; to: #2980b9; startEvents: mouseenter"
            animation__leave="property: material.color; from: #2980b9; to: #3498db; startEvents: mouseleave">
            <a-text value="My Portfolio" align="center" position="0 0 0.051" width="2"></a-text>
          </a-box>

          <a-box 
            class="clickable"
            position="0.5 -0.2 0.1" 
            width="0.8" height="0.3" depth="0.1" 
            color="#2ecc71"
            onclick="window.open('https://github.com/d-j7code', '_blank')"
            animation__hover="property: scale; to: 1.1 1.1 1.1; startEvents: mouseenter"
            animation__leave="property: scale; to: 1 1 1; startEvents: mouseleave">
            <a-text value="View GitHub" align="center" position="0 0 0.051" width="2"></a-text>
          </a-box>

        </a-entity>
      </a-marker>

      <a-entity camera>
        <a-entity cursor="fuse: false"
                  position="0 0 -1"
                  geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
                  material="color: white; shader: flat"
                  raycaster="objects: .clickable">
        </a-entity>
      </a-entity>

    </a-scene>
  </body>
</html>
