<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>David Futuristic AR Card</title>

<script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

<script>

AFRAME.registerComponent('marker-handler', {
init: function () {

const status = document.getElementById("status")

this.el.addEventListener("targetFound", () => {
status.innerHTML = "ID Card Detected"
status.style.color = "#00ffc3"
})

this.el.addEventListener("targetLost", () => {
status.innerHTML = "Scanning..."
status.style.color = "yellow"
})
}
})

AFRAME.registerComponent("billboard", {
tick: function(){
const cam = this.el.sceneEl.camera
if(!cam) return
this.el.object3D.lookAt(cam.position)
}
})

AFRAME.registerComponent("click-handler", {
schema:{type:"string"},
init:function(){
this.el.addEventListener("mousedown",()=>{
window.open(this.data,"_blank")
})
this.el.addEventListener("touchend",()=>{
window.open(this.data,"_blank")
})
}
})

AFRAME.registerComponent("float", {
tick:function(time){
this.el.object3D.position.y = Math.sin(time/700)*0.02
}
})

</script>

</head>

<body style="margin:0;overflow:hidden">

<div id="status"
style="position:absolute;top:10px;left:10px;
background:rgba(0,0,0,0.6);
padding:12px;border-radius:6px;
color:yellow;font-family:sans-serif">
Initializing AR...
</div>


<a-scene
mindar-image="imageTargetSrc: targets.mind; autoStart: true; filterMinCF:0.001; filterBeta:50;"
color-space="sRGB"
renderer="colorManagement:true"
vr-mode-ui="enabled:false"
device-orientation-permission-ui="enabled:false">

<a-assets>

<img id="githubIcon" src="https://cdn-icons-png.flaticon.com/512/25/25231.png">
<img id="webIcon" src="https://cdn-icons-png.flaticon.com/512/841/841364.png">

</a-assets>


<a-camera
position="0 0 0"
look-controls="enabled:false"
raycaster="objects:.clickable"
cursor="rayOrigin:mouse">
</a-camera>



<a-entity mindar-image-target="targetIndex:0" marker-handler>

<a-entity billboard float scale="0.6 0.6 0.6">

<!-- MAIN PANEL -->

<a-plane width="3" height="4.2"
color="#0c0f18"
opacity="0.95"
material="shader:standard;metalness:0.4;roughness:0.2">
</a-plane>


<!-- GLOW BORDER -->

<a-plane width="3.05" height="4.25"
color="#00ffd5"
opacity="0.2"
position="0 0 -0.01">
</a-plane>


<!-- NAME -->

<a-text
value="DAVID JOEMON"
align="center"
color="#00ffe5"
position="0 1.8 0.02"
width="5"
font="roboto">
</a-text>

<a-text
value="FULL STACK ENGINEER"
align="center"
color="#ffffff"
position="0 1.55 0.02"
width="3.5">
</a-text>


<!-- DIVIDER -->

<a-plane width="2.6" height="0.01"
color="#00ffd5"
position="0 1.3 0.02">
</a-plane>


<!-- DESCRIPTION -->

<a-text
value="Building scalable products\nModern web architectures\nPassionate about innovation"
align="center"
color="#cccccc"
width="4"
position="0 0.9 0.02">
</a-text>


<!-- SKILLS TITLE -->

<a-text
value="TECH STACK"
align="center"
color="#00ffd5"
position="0 0.45 0.02"
width="3">
</a-text>


<!-- SKILL BOXES -->

<a-plane width="2.6" height="0.35"
color="#1a2130"
position="0 0.15 0.02"></a-plane>

<a-text
value="React • Node • Python"
align="center"
color="#ffffff"
position="0 0.15 0.03"
width="3.5">
</a-text>


<a-plane width="2.6" height="0.35"
color="#1a2130"
position="0 -0.3 0.02"></a-plane>

<a-text
value="MongoDB • PostgreSQL • AWS"
align="center"
color="#ffffff"
position="0 -0.3 0.03"
width="3.5">
</a-text>


<a-plane width="2.6" height="0.35"
color="#1a2130"
position="0 -0.75 0.02"></a-plane>

<a-text
value="Docker • Git • APIs"
align="center"
color="#ffffff"
position="0 -0.75 0.03"
width="3.5">
</a-text>


<!-- LINKS -->

<a-text
value="CONNECT"
align="center"
color="#00ffd5"
position="0 -1.2 0.02"
width="3">
</a-text>


<!-- WEBSITE BUTTON -->

<a-entity
class="clickable"
click-handler="https://davidajoemon.vercel.app/"
position="-0.7 -1.6 0.05">

<a-plane
width="0.9"
height="0.4"
color="#00aaff">
</a-plane>

<a-image
src="#webIcon"
width="0.2"
height="0.2"
position="-0.25 0 0.01">
</a-image>

<a-text
value="Portfolio"
align="center"
position="0.15 0 0.01"
width="2"
color="#fff">
</a-text>

</a-entity>



<!-- GITHUB BUTTON -->

<a-entity
class="clickable"
click-handler="https://github.com/d-j7code"
position="0.7 -1.6 0.05">

<a-plane
width="0.9"
height="0.4"
color="#24292e">
</a-plane>

<a-image
src="#githubIcon"
width="0.2"
height="0.2"
position="-0.25 0 0.01">
</a-image>

<a-text
value="GitHub"
align="center"
position="0.15 0 0.01"
width="2"
color="#fff">
</a-text>

</a-entity>

</a-entity>

</a-entity>

</a-scene>

</body>
</html>
