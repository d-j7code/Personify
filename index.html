<!DOCTYPE html>
<html>
  <head>
    <title>David's AR ID Card</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
      vr-mode-ui="enabled: false"
      cursor="rayOrigin: mouse"
      raycaster="objects: .clickable">

      <a-marker type="pattern" url="./myid.patt" preset="custom">
        
        <a-entity id="dashboard" position="0 0 0" rotation="-90 0 0">
          
          <a-plane width="2.2" height="1.4" color="#1a1a1a" opacity="0.9" radius="0.1"></a-plane>

          <a-text value="DAVID JOEMON" color="#00ffcc" align="center" position="0 0.45 0.05" width="4"></a-text>
          <a-text value="Full-Stack Product Engineer" color="#ffffff" align="center" position="0 0.3 0.05" width="2.5"></a-text>

          <a-box 
            class="clickable"
            position="-0.5 -0.2 0.1" 
            width="0.8" height="0.3" depth="0.1" 
            color="#3498db"
            onclick="window.open('https://davidajoemon.vercel.app/', '_blank')"
            animation__hover="property: material.color; from: #3498db; to: #2980b9; startEvents: mouseenter"
            animation__leave="property: material.color; from: #2980b9; to: #3498db; startEvents: mouseleave">
            <a-text value="My Portfolio" align="center" position="0 0 0.06" width="2"></a-text>
          </a-box>

          <a-box 
            class="clickable"
            position="0.5 -0.2 0.1" 
            width="0.8" height="0.3" depth="0.1" 
            color="#2ecc71"
            onclick="window.open('https://github.com/d-j7code', '_blank')"
            animation__hover="property: scale; to: 1.1 1.1 1.1; startEvents: mouseenter"
            animation__leave="property: scale; to: 1 1 1; startEvents: mouseleave">
            <a-text value="View GitHub" align="center" position="0 0 0.06" width="2"></a-text>
          </a-box>

        </a-entity>
      </a-marker>

      <a-entity camera>
        <a-entity cursor="fuse: false"
                  position="0 0 -1"
                  geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
                  material="color: white; shader: flat"
                  raycaster="objects: .clickable">
        </a-entity>
      </a-entity>

    </a-scene>
  </body>
</html>
