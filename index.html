<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>David's AR ID Card</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <script>
      let contentVisible = false;
      let lastKnownPosition = new THREE.Vector3();
      let lastKnownRotation = new THREE.Quaternion();

      AFRAME.registerComponent('marker-debug', {
        init: function() {
          const sceneEl = this.el.sceneEl;
          sceneEl.addEventListener('arReady', () => {
            console.log('AR Ready');
            document.getElementById('status').innerText = 'Looking for ID card...';
          });
          sceneEl.addEventListener('arError', (err) => {
            console.log('AR Error', err);
          });
          this.el.addEventListener('targetFound', () => {
            console.log('TARGET FOUND!');
            document.getElementById('status').innerText = 'ID Card Found!';
            document.getElementById('status').style.color = 'lime';
            contentVisible = true;
            const dashboard = document.getElementById('dashboard');
            dashboard.object3D.visible = true;
          });
          this.el.addEventListener('targetLost', () => {
            console.log('TARGET LOST!');
            document.getElementById('status').innerText = 'Content Locked';
            document.getElementById('status').style.color = 'orange';
          });
        }
      });

      AFRAME.registerComponent('lock-horizon', {
        init: function() {
          this.dashboard = document.getElementById('dashboard');
          this.dashboard.object3D.visible = false;
        },
        tick: function() {
          if (!this.dashboard || !contentVisible) return;
          const camera = this.el.sceneEl.camera;
          if (!camera) return;

          const target = this.el;
          if (target.object3D.visible) {
            target.object3D.getWorldPosition(lastKnownPosition);
            target.object3D.getWorldQuaternion(lastKnownRotation);
          }

          this.dashboard.object3D.position.copy(lastKnownPosition);
          this.dashboard.object3D.position.z += 0.3;
          
          const cameraPos = camera.position;
          this.dashboard.object3D.lookAt(cameraPos.x, cameraPos.y, cameraPos.z);
        }
      });

      function openLink(url) {
        window.open(url, '_blank');
      }
    </script>
  </head>

  <body style="margin: 0; overflow: hidden; touch-action: none;">
    <div id="status" style="position: absolute; top: 10px; left: 10px; z-index: 999; color: yellow; font-size: 16px; font-weight: bold; background: rgba(0,0,0,0.7); padding: 8px; border-radius: 5px;">
      Initializing AR...
    </div>
    <a-scene 
      mindar-image="imageTargetSrc: targets.mind; autoStart: true; uiLoading: no; uiError: no; uiScanning: no; filterMinCF: 0.0001; filterBeta: 10;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      cursor="rayOrigin: mouse"
      raycaster="objects: .clickable">

      <a-camera position="0 0 0" look-controls="enabled: false" cursor="rayOrigin: mouse"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0" marker-debug>
        
        <a-entity id="dashboard" position="0 0 0.3" scale="0.5 0.5 0.5" lock-horizon>
          
          <a-plane width="2.2" height="1.4" color="#1a1a1a" opacity="0.9"></a-plane>

          <a-text value="DAVID JOEMON" color="#00ffcc" align="center" position="0 0.45 0.01" width="4"></a-text>
          <a-text value="Full-Stack Product Engineer" color="#ffffff" align="center" position="0 0.3 0.01" width="2.5"></a-text>

          <a-box 
            class="clickable"
            position="-0.5 -0.2 0.1" 
            width="0.8" height="0.3" depth="0.1" 
            color="#3498db"
            onclick="openLink('https://davidajoemon.vercel.app/')">
            <a-text value="My Portfolio" align="center" position="0 0 0.051" width="2"></a-text>
          </a-box>

          <a-box 
            class="clickable"
            position="0.5 -0.2 0.1" 
            width="0.8" height="0.3" depth="0.1" 
            color="#2ecc71"
            onclick="openLink('https://github.com/d-j7code')">
            <a-text value="View GitHub" align="center" position="0 0 0.051" width="2"></a-text>
          </a-box>

        </a-entity>
      </a-entity>

    </a-scene>
  </body>
</html>
