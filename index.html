<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>David's AR ID Card</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <script>
      AFRAME.registerComponent('marker-debug', {
        init: function() {
          const sceneEl = this.el.sceneEl;
          sceneEl.addEventListener('arReady', () => {
            console.log('AR Ready');
            document.getElementById('status').innerText = 'Looking for ID card...';
          });
          sceneEl.addEventListener('arError', (err) => {
            console.log('AR Error', err);
          });
          this.el.addEventListener('targetFound', () => {
            console.log('TARGET FOUND!');
            document.getElementById('status').innerText = 'ID Card Found!';
            document.getElementById('status').style.color = 'lime';
          });
          this.el.addEventListener('targetLost', () => {
            console.log('TARGET LOST!');
            document.getElementById('status').innerText = 'Looking for ID card...';
            document.getElementById('status').style.color = 'yellow';
          });
        }
      });

      AFRAME.registerComponent('lock-horizon', {
        tick: function() {
          const target = this.el;
          const camera = this.el.sceneEl.camera;
          if (!camera) return;

          const targetPos = new THREE.Vector3();
          target.object3D.getWorldPosition(targetPos);

          const dashboard = document.getElementById('dashboard');
          dashboard.object3D.position.copy(targetPos);
          dashboard.object3D.position.y += 0.3;
          dashboard.object3D.lookAt(camera.position);
        }
      });
    </script>
  </head>

  <body style="margin: 0; overflow: hidden; touch-action: none;">
    <div id="status" style="position: absolute; top: 10px; left: 10px; z-index: 999; color: yellow; font-size: 16px; font-weight: bold; background: rgba(0,0,0,0.7); padding: 8px; border-radius: 5px;">
      Initializing AR...
    </div>
    <a-scene 
      mindar-image="imageTargetSrc: targets.mind; autoStart: true; uiLoading: no; uiError: no; uiScanning: no;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false">

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0" marker-debug lock-horizon>
        
        <a-entity id="dashboard" position="0 0.3 0" scale="0.8 0.8 0.8">
          
          <a-plane width="2.2" height="1.4" color="#1a1a1a" opacity="0.9"></a-plane>

          <a-text value="DAVID JOEMON" color="#00ffcc" align="center" position="0 0.45 0.01" width="4"></a-text>
          <a-text value="Full-Stack Product Engineer" color="#ffffff" align="center" position="0 0.3 0.01" width="2.5"></a-text>

          <a-box 
            class="clickable"
            position="-0.5 -0.2 0.1" 
            width="0.8" height="0.3" depth="0.1" 
            color="#3498db"
            onclick="window.open('https://davidajoemon.vercel.app/', '_blank')"
            animation__hover="property: material.color; from: #3498db; to: #2980b9; startEvents: mouseenter"
            animation__leave="property: material.color; from: #2980b9; to: #3498db; startEvents: mouseleave">
            <a-text value="My Portfolio" align="center" position="0 0 0.051" width="2"></a-text>
          </a-box>

          <a-box 
            class="clickable"
            position="0.5 -0.2 0.1" 
            width="0.8" height="0.3" depth="0.1" 
            color="#2ecc71"
            onclick="window.open('https://github.com/d-j7code', '_blank')"
            animation__hover="property: scale; to: 1.1 1.1 1.1; startEvents: mouseenter"
            animation__leave="property: scale; to: 1 1 1; startEvents: mouseleave">
            <a-text value="View GitHub" align="center" position="0 0 0.051" width="2"></a-text>
          </a-box>

        </a-entity>
      </a-entity>

    </a-scene>
  </body>
</html>
